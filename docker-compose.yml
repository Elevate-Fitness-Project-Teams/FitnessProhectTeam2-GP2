
services:
  sqlserver-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: elevate-sqlserver-db
    restart: unless-stopped
    ports:
      - "1444:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Elvate2026!
    volumes:
      - sqlserver-db-data:/var/opt/mssql

  # --- MariaDB (Nutrition DB) ---
  nutrition-db:
    image: mariadb:11.4
    container_name: elevate-nutrition-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nutrition
      MYSQL_USER: nutrition_user
      MYSQL_PASSWORD: nutrition_pass
    volumes:
      - nutrition-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Microservices ---
  elevate.auth:
    build:
      context: .
      dockerfile: src/services/Elevate.Auth/Dockerfile
    container_name: elevate-auth-api
    restart: unless-stopped
    ports:
      - "5007:8080"
  nutrition-api:
    build:
      context: .
      dockerfile: src/services/Elevate.Nutrition/Dockerfile
    container_name: elevate-nutrition-api
    restart: unless-stopped
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      nutrition-db:
        condition: service_healthy

  elevate.smartcoach:
    build:
      context: .
      dockerfile: src/services/Elevate.smartCoach/Dockerfile
    container_name: elevate-smartcoach-api
    restart: unless-stopped
    ports:
      - "5004:8080"

  elevate.subscription:
    image: elevate.subscription
    build:
      context: .
      dockerfile: src/services/Elevate.subscription/Dockerfile
    container_name: elevate-subscription-api
    restart: unless-stopped
    ports:
      - "5005:8080"

  elevate.nutrition:
    image: elevate.nutrition
    build:
      context: .
      dockerfile: src/services/Elevate.Nutrition/Dockerfile
    container_name: elevate-nutrition-service-api
    restart: unless-stopped
    ports:
      - "5006:8080"

volumes:
  nutrition-db-data:
  sqlserver-db-data: